
<style>
@import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital@1&family=Jost:wght@300;400;500&family=Share+Tech+Mono&display=swap');
.fw{display:flex;flex-direction:column;align-items:center;padding:28px 16px 32px;gap:16px;}
.eyebrow{font-family:'Jost',sans-serif;font-size:11px;letter-spacing:.13em;text-transform:uppercase;color:var(--color-text-secondary);}
.cs{border-radius:4px;overflow:hidden;box-shadow:0 24px 60px rgba(0,0,0,.55),0 4px 14px rgba(0,0,0,.35);width:220px;height:293px;flex-shrink:0;}
canvas{display:block;width:100%;height:100%;}
.cn{font-family:'Cormorant Garamond',serif;font-size:23px;font-style:italic;font-weight:400;color:var(--color-text-primary);margin:0;text-align:center;}
.acts{display:flex;gap:10px;width:100%;max-width:300px;}
.acts button{flex:1;height:46px;border-radius:4px;font-family:'Jost',sans-serif;font-size:12px;letter-spacing:.05em;cursor:pointer;transition:opacity .2s;}
.bok{background:#0a0a1e;border:none;color:#c8d8f5;}
.bok:hover{opacity:.85;}
.bch{background:transparent;border:.5px solid var(--color-border-secondary);color:var(--color-text-primary);}
.bch:hover{background:var(--color-background-secondary);}
</style>
<div class="fw">
  <span class="eyebrow">Birthday · Design 3 · v6</span>
  <div class="cs"><canvas id="mc" width="300" height="400"></canvas></div>
  <p class="cn">Mineral Moon</p>
  <div class="acts">
    <button class="bok" onclick="sendPrompt('Mineral Moon v6 approved — Birthday Design 3 locked')">Approve ✓</button>
    <button class="bch" onclick="sendPrompt('Suggest changes to Mineral Moon')">Suggest changes ↗</button>
  </div>
</div>
<script>
const mc = document.getElementById('mc');
const ctx = mc.getContext('2d');
const W=300, H=400, MCX=150, MCY=400, MR=170;
let t=0, raf;

// Off-screen canvas for the moon surface (drawn once)
const off = document.createElement('canvas');
off.width = W; off.height = H;
const oc = off.getContext('2d');

function buildMoon(img){
  oc.clearRect(0,0,W,H);
  oc.save();
  oc.beginPath(); oc.arc(MCX,MCY,MR,0,Math.PI*2); oc.clip();

  // Draw moon photo scaled to fill the circle
  oc.drawImage(img, MCX-MR, MCY-MR, MR*2, MR*2);

  // Color grading — cool blue tint to pull the photo into the starfield palette
  const tint=oc.createRadialGradient(MCX,MCY,0,MCX,MCY,MR);
  tint.addColorStop(0,'rgba(80,110,210,0.08)');
  tint.addColorStop(0.6,'rgba(55,85,190,0.14)');
  tint.addColorStop(1,'rgba(30,55,160,0.22)');
  oc.fillStyle=tint; oc.fillRect(0,0,W,H);

  // Subtle warm highlight — upper-left, as if lit by a distant star
  const hl=oc.createRadialGradient(MCX-50,MCY-80,0,MCX-30,MCY-50,120);
  hl.addColorStop(0,'rgba(255,248,230,0.18)');
  hl.addColorStop(1,'rgba(255,255,255,0)');
  oc.fillStyle=hl; oc.fillRect(0,0,W,H);

  // Moon edge shadow
  const edge=oc.createRadialGradient(MCX,MCY,MR*0.72,MCX,MCY,MR);
  edge.addColorStop(0,'rgba(0,0,0,0)');
  edge.addColorStop(0.85,'rgba(0,0,0,0.22)');
  edge.addColorStop(1,'rgba(0,0,0,0.60)');
  oc.fillStyle=edge; oc.fillRect(0,0,W,H);

  oc.restore();
}

function drawBg(){
  const bg=ctx.createLinearGradient(0,0,0,H);
  bg.addColorStop(0,'#030310');
  bg.addColorStop(0.4,'#06061a');
  bg.addColorStop(1,'#090920');
  ctx.fillStyle=bg; ctx.fillRect(0,0,W,H);
  // Nebulae
  [[55,65,130,'rgba(35,25,75,0.22)'],[242,52,112,'rgba(15,38,88,0.20)'],[148,148,160,'rgba(10,15,55,0.14)']].forEach(([cx,cy,r,c])=>{
    const g=ctx.createRadialGradient(cx,cy,0,cx,cy,r);
    g.addColorStop(0,c);g.addColorStop(1,'rgba(0,0,0,0)');
    ctx.fillStyle=g;ctx.fillRect(0,0,W,H);
  });
}

function drawStars(time){
  // Static background stars
  const pts=[
    [32,43,1.0,0.84],[32,96,0.7,0.68],[68,110,0.6,0.62],[90,100,0.8,0.74],
    [142,86,0.7,0.70],[178,100,0.6,0.62],[216,84,0.8,0.74],[254,96,0.7,0.68],
    [284,86,0.7,0.70],[18,140,0.7,0.60],[88,134,0.6,0.58],[128,124,0.7,0.60],
    [166,140,0.7,0.60],[204,127,0.6,0.54],[242,140,0.7,0.60],[276,130,0.6,0.58],
    [20,160,0.6,0.50],[58,166,0.6,0.46],[100,158,0.6,0.44],[140,166,0.7,0.50],
    [182,158,0.5,0.42],[222,166,0.6,0.48],[262,158,0.5,0.44],[288,166,0.6,0.48],
    [26,184,0.5,0.40],[68,190,0.5,0.36],[110,182,0.5,0.34],[152,190,0.5,0.38],
    [194,182,0.5,0.32],[236,190,0.5,0.36],[278,182,0.5,0.34],
    [34,214,0.5,0.28],[78,220,0.5,0.24],[122,212,0.5,0.22],[166,220,0.5,0.26],
    [210,212,0.5,0.22],[254,220,0.5,0.24],[42,236,0.5,0.18],[86,242,0.5,0.16],
    [130,234,0.5,0.14],[174,242,0.5,0.18],[218,234,0.5,0.14],[262,242,0.5,0.16],
  ];
  pts.forEach(([x,y,r,a])=>{
    ctx.beginPath();ctx.arc(x,y,r,0,Math.PI*2);
    ctx.fillStyle=`rgba(215,228,255,${a})`;ctx.fill();
  });

  // Pulsating stars: [x, y, r, minAlpha, maxAlpha, speed, phase]
  const pulse=[
    [86,23, 1.4, 0.38,0.96, 0.80,0.00],
    [198,16,1.2, 0.32,0.94, 1.10,1.70],
    [140,31,0.9, 0.28,0.80, 0.60,3.20],
    [18,18, 0.9, 0.22,0.86, 1.30,0.90],
    [54,12, 0.7, 0.18,0.76, 0.95,2.40],
    [130,10,0.9, 0.28,0.82, 1.10,2.10],
    [162,18,0.7, 0.18,0.72, 1.40,1.10],
    [204,14,0.9, 0.30,0.84, 0.70,3.70],
    [244,22,0.8, 0.20,0.78, 0.75,4.10],
    [274,11,0.7, 0.16,0.70, 1.20,2.80],
    [44,68, 0.9, 0.28,0.86, 1.00,3.50],
    [104,78,0.7, 0.18,0.78, 0.85,1.30],
    [118,40,0.7, 0.18,0.76, 1.50,0.60],
    [186,34,0.7, 0.20,0.74, 0.90,4.80],
    [230,44,0.9, 0.24,0.80, 0.65,1.50],
    [266,39,1.0, 0.32,0.82, 1.25,1.40],
    [262,60,0.7, 0.18,0.72, 0.80,5.20],
    [286,50,0.9, 0.26,0.80, 1.00,0.40],
    [14,54, 0.7, 0.18,0.72, 1.60,2.90],
    [52,150,0.9, 0.20,0.70, 0.55,1.80],
  ];
  pulse.forEach(([x,y,r,mn,mx,sp,ph])=>{
    const a=mn+(mx-mn)*(0.5+0.5*Math.sin(time*sp+ph));
    ctx.beginPath();ctx.arc(x,y,r,0,Math.PI*2);
    ctx.fillStyle=`rgba(215,228,255,${a.toFixed(3)})`;ctx.fill();
  });

  // Cross glints on three brightest — also pulse
  [[86,23,0.00],[198,16,1.70],[140,31,3.20]].forEach(([x,y,ph])=>{
    const ga=(0.18+0.38*(0.5+0.5*Math.sin(time*0.8+ph))).toFixed(3);
    ctx.strokeStyle=`rgba(215,228,255,${ga})`;ctx.lineWidth=0.5;ctx.setLineDash([]);
    ctx.beginPath();ctx.moveTo(x-4,y);ctx.lineTo(x+4,y);ctx.stroke();
    ctx.beginPath();ctx.moveTo(x,y-4);ctx.lineTo(x,y+4);ctx.stroke();
  });

  // Constellation
  ctx.strokeStyle='rgba(165,192,235,0.15)';ctx.lineWidth=0.4;ctx.setLineDash([1,4]);
  [[250,66,260,74],[260,74,254,84],[260,74,270,82],[270,82,276,72]].forEach(([x1,y1,x2,y2])=>{
    ctx.beginPath();ctx.moveTo(x1,y1);ctx.lineTo(x2,y2);ctx.stroke();});
  ctx.setLineDash([]);
}

function drawDots(time){
  const sp=5.6, br=1.1;
  ctx.save();
  ctx.beginPath();ctx.arc(MCX,MCY,MR,0,Math.PI*2);ctx.clip();
  for(let y=MCY-MR;y<=MCY+MR;y+=sp){
    for(let x=MCX-MR;x<=MCX+MR;x+=sp){
      const dx=x-MCX,dy=y-MCY,dist=Math.sqrt(dx*dx+dy*dy);
      if(dist>MR) continue;
      const wave=Math.sin(time*0.7 - dist*0.052)*0.5+0.5;
      const r=br*(0.30+wave*0.70);
      // Fade to zero before the edge so dots stay firmly inside the moon body
      const ef=Math.max(0, 1 - (dist/MR)*1.15);
      ctx.fillStyle=`rgba(255,255,255,${(0.30*ef*wave).toFixed(3)})`;
      ctx.beginPath();ctx.arc(x,y,r,0,Math.PI*2);ctx.fill();
    }
  }
  ctx.restore();
}

function drawUI(){
  const mono='"Share Tech Mono","Courier New",monospace';
  ctx.setLineDash([]);
  ctx.strokeStyle='rgba(95,135,238,0.20)';ctx.lineWidth=0.6;ctx.strokeRect(9,9,282,382);
  ctx.textBaseline='top';
  ctx.font=`5.5px ${mono}`;ctx.fillStyle='rgba(148,180,238,0.32)';ctx.textAlign='center';
  //ctx.fillText('ARTEMIS-II · 2025',150,172);
  ctx.font=`5px ${mono}`;ctx.fillStyle='rgba(135,168,228,0.26)';ctx.textAlign='right';
  ctx.fillText('[Ti] mare',288,204);ctx.fillText('[Fe] terra',288,211);ctx.fillText('[Mg] basin',288,218);
  ctx.font=`6px ${mono}`;ctx.fillStyle='rgba(135,165,228,0.30)';ctx.textAlign='left';
  ctx.fillText('/ \\',14,184);ctx.fillText('\\ /',14,191);ctx.textAlign='right';
  ctx.fillText('/ \\',284,184);ctx.fillText('\\ /',284,191);
  ctx.font='italic 13px "Cormorant Garamond",Georgia,serif';
  ctx.fillStyle='rgba(190,210,252,0.76)';ctx.textAlign='left';ctx.fillText('To,',20,34);
  ctx.strokeStyle='rgba(125,158,228,0.24)';ctx.lineWidth=0.5;ctx.setLineDash([3,4]);
  [52,70,88,106,124,142].forEach(ly=>{ctx.beginPath();ctx.moveTo(20,ly);ctx.lineTo(192,ly);ctx.stroke();});
  ctx.setLineDash([]);
  ctx.font='italic 13px "Cormorant Garamond",Georgia,serif';
  ctx.fillStyle='rgba(190,210,252,0.76)';ctx.fillText('From,',20,254);
  ctx.strokeStyle='rgba(125,158,228,0.24)';ctx.lineWidth=0.5;ctx.setLineDash([3,4]);
  ctx.beginPath();ctx.moveTo(20,240);ctx.lineTo(114,240);ctx.stroke();
  ctx.setLineDash([]);
  ctx.font='italic 8.5px "Cormorant Garamond",Georgia,serif';
  ctx.fillStyle='rgba(148,178,238,0.36)';ctx.textAlign='center';
  ctx.fillText('a wish sent to the stars',150,390);
}

function loop(){
  ctx.clearRect(0,0,W,H);
  drawBg();
  drawStars(t);
  // Horizon glow
  const hg=ctx.createRadialGradient(MCX,MCY-MR,0,MCX,MCY-MR,160);
  hg.addColorStop(0,'rgba(72,95,195,0.10)');hg.addColorStop(1,'rgba(0,0,0,0)');
  ctx.fillStyle=hg;ctx.fillRect(0,0,W,MCY-MR+80);
  // Moon photo
  ctx.drawImage(off,0,0);
  // Animated halftone dots
  drawDots(t);
  drawUI();
  t+=0.014;
  raf=requestAnimationFrame(loop);
}

// Load moon photo then start loop
const img=new Image();
img.onload=()=>{buildMoon(img);loop();};
img.src='assets/images/moon.jpg';

// Load fonts
const fl='https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Cormorant+Garamond:ital@1&display=swap';
if(!document.querySelector(`link[href="${fl}"]`)){const l=document.createElement('link');l.rel='stylesheet';l.href=fl;document.head.appendChild(l);}
</script>
